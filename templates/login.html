<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1115">
  <title>Entrar · Portal SWN</title>
  <link rel="icon" href="{{ url_for('static', filename='icon.svg') }}">
  <style>
    :root{
      --bg:#0f1115; --panel:#161a22; --panel2:#1c2230; --line:#262d3a;
      --txt:#e8ecf3; --muted:#9aa6b8; --brand:#b4d233; --brand2:#cbe465;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:var(--bg);color:var(--txt);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background-image:radial-gradient(1200px 600px at 50% -10%,rgba(180,210,51,.10),transparent)}
    .card{width:100%;max-width:400px;margin:20px;background:var(--panel);
      border:1px solid var(--line);border-radius:16px;padding:26px}
    .logo{display:flex;justify-content:center;margin-bottom:6px}
    h1{font-size:18px;text-align:center;margin:8px 0 2px}
    .sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:18px}
    label{display:block;font-size:13px;color:var(--muted);margin:12px 0 6px}
    input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;
      background:var(--panel2);color:var(--txt);font-size:15px;outline:none}
    input:focus{border-color:var(--brand)}
    .btn{width:100%;margin-top:18px;padding:12px;border:0;border-radius:10px;cursor:pointer;
      font-weight:800;font-size:15px;background:var(--brand);color:#1a1300}
    .btn:hover{background:var(--brand2)}
    .erro{margin-top:14px;padding:10px 12px;border-radius:10px;font-size:13px;
      background:rgba(231,76,60,.15);color:#f29a90;border:1px solid rgba(231,76,60,.3)}
  </style>
</head>
<body>
  <form class="card" method="post" action="{{ url_for('login') }}">
    <div class="logo">
      <svg width="84" height="40" viewBox="0 0 58 28" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SWN">
        <rect width="58" height="28" rx="7" fill="#fff"/>
        <text x="6" y="22" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="21" letter-spacing="-1.5">
          <tspan fill="#1b3c86">s</tspan><tspan fill="#b4d233">w</tspan><tspan fill="#2e241a">n</tspan>
        </text>
      </svg>
    </div>
    <h1>Portal SWN</h1>
    <div class="sub">Acesse com seu e-mail e senha.</div>

    <label for="email">E-mail</label>
    <input id="email" name="email" type="email" autocomplete="username" required autofocus>

    <label for="senha">Senha</label>
    <input id="senha" name="senha" type="password" autocomplete="current-password" required>

    <button class="btn" type="submit">Entrar</button>

    {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}
  </form>
</body>
</html>
