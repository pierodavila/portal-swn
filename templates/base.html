<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1115">
  <title>{% block title %}{{ titulo or "Portal SWN" }}{% endblock %} · Portal SWN</title>
  <link rel="manifest" href="{{ url_for('manifest') }}">
  <link rel="icon" href="{{ url_for('static', filename='icon.svg') }}">
  <style>
    :root{
      --bg:#0f1115; --panel:#161a22; --panel2:#1c2230; --line:#262d3a;
      --txt:#e8ecf3; --muted:#9aa6b8;
      --brand:#b4d233; --brand2:#cbe465;   /* verde-limão SWN */
      --blue:#1b3c86; --brown:#2e241a;      /* tricolor do wordmark */
      --radius:14px;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--txt);line-height:1.5;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
    a{color:var(--brand2)}
    .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;
      padding:12px 20px;background:rgba(15,17,21,.92);backdrop-filter:blur(8px);
      border-bottom:1px solid var(--line)}
    .brandmark{display:block}
    .topbar .who{margin-left:auto;display:flex;align-items:center;gap:12px;color:var(--muted);font-size:14px}
    .badge{padding:3px 10px;border-radius:999px;background:var(--panel2);
      border:1px solid var(--line);font-size:12px;color:var(--muted)}
    .logout,.navbtn{padding:7px 13px;border-radius:9px;border:1px solid var(--line);
      background:var(--panel2);color:var(--txt);font-size:13px;text-decoration:none;cursor:pointer}
    .logout:hover,.navbtn:hover{background:var(--panel)}
    .wrap{max-width:1080px;margin:0 auto;padding:22px 20px 60px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:18px}
    h1,h2{margin:0 0 8px}
    h1{font-size:22px}
    .muted{color:var(--muted)}
    .note{background:linear-gradient(135deg,rgba(180,210,51,.08),rgba(27,60,134,.10));
      border:1px solid var(--line);border-radius:12px;padding:12px 14px;color:var(--muted);font-size:13px;margin-bottom:18px}
  </style>
</head>
<body>
  <header class="topbar">
    <svg class="brandmark" width="58" height="28" viewBox="0 0 58 28" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SWN Premium Outlets">
      <rect width="58" height="28" rx="7" fill="#fff"/>
      <text x="6" y="22" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="21" letter-spacing="-1.5">
        <tspan fill="#1b3c86">s</tspan><tspan fill="#b4d233">w</tspan><tspan fill="#2e241a">n</tspan>
      </text>
    </svg>
    <strong style="letter-spacing:.5px">Portal SWN</strong>
    {% if user %}
    <div class="who">
      <a class="navbtn" href="{{ url_for('portal') }}">Painel</a>
      {% if user.papel == 'admin' %}<a class="navbtn" href="{{ url_for('admin_usuarios') }}">Usuários</a>{% endif %}
      <span class="badge">{{ user.nome }} · {{ user.papel }}</span>
      <a class="logout" href="{{ url_for('logout') }}">Sair</a>
    </div>
    {% endif %}
  </header>
  <main class="wrap">
    {% block body %}
      <div class="card">
        <h1>{{ titulo or "Portal SWN" }}</h1>
        <p class="muted">{{ conteudo or "" }}</p>
        {% if user %}<p><a href="{{ url_for('portal') }}">Voltar ao painel</a></p>{% endif %}
      </div>
    {% endblock %}
  </main>
</body>
</html>
